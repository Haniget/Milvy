function rnd(){ _seed = (_seed * 1103515245 + 12345) & 0x7fffffff; return _seed / 0x7fffffff; }

function hav(a,b){ const R=6371, dLat=(b.lat-a.lat)*Math.PI/180, dLng=(b.lng-a.lng)*Math.PI/180;

  return R*2*Math.atan2(Math.sqrt(s),Math.sqrt(1-s)); }

      let dist = Math.max(0.8, hav(start,stop) + rnd()*4); dist = Math.round(dist*10)/10;
      const restidMin = Math.max(3, Math.round(dist*1.6 + rnd()*6));
      const stoppTid = new Date(startTid.getTime()+restidMin*60000);
      const matarStart = Math.round(matar); matar += dist; const matarStopp = Math.round(matar);
      let liter = dist*0.07*(rnd()>0.9?1.8:1); liter=Math.round(liter*100)/100;
      RESOR.push({ id: v.enhetId+"_"+pad(datum.getDate())+pad(datum.getMonth()+1)+String(datum.getFullYear()).slice(2)+"n"+(++rid),
        fordonId:v.id, fordonRegNr:v.regNr, forareId:FORARE[vi].id, forareNamn:FORARE[vi].namn,

        resetyp:klassificeraResa(startTid), resesyfte:"", attesterad:false });
    }
    FORDON[vi].matarstallningKm = Math.round(matar);
  });
}
RESOR.sort((a,b)=> b.startTid - a.startTid);
const SENASTE_POS = {};
FORDON.forEach(v=>{ const r = RESOR.find(x=>x.fordonId===v.id);
  if (r) SENASTE_POS[v.id] = { lat:r.stoppLat, lng:r.stoppLng, tid:r.stoppTid, adress:r.stoppAdress, hast:r.hogstaHastighet }; });

/* ---- Maskiner (utöver fordon) + objekt/zoner ---- */
const MASKINER=[
  {id:"m1",namn:"Grävmaskin CAT 320",typ:"Maskin",lat:59.5980,lng:16.5300,status:"aktiv"},
  {id:"m2",namn:"Hjullastare Volvo L60",typ:"Maskin",lat:59.6520,lng:16.6050,status:"aktiv"},
  {id:"m3",namn:"Minigrävare Kubota U27",typ:"Maskin",lat:59.6100,lng:16.4750,status:"aktiv"},
];
const ALLAOBJEKT=[...FORDON.map(v=>({id:v.id,namn:v.regNr,typ:"Fordon"})), ...MASKINER.map(m=>({id:m.id,namn:m.namn,typ:"Maskin",lat:m.lat,lng:m.lng}))];
function objektPos(o){ if(!o)return null; if(o.typ==="Maskin")return {lat:o.lat,lng:o.lng}; const p=SENASTE_POS[o.id]; return p?{lat:p.lat,lng:p.lng}:null; }
function punktIPolygon(p, pts){ // ray casting; pts = [[lat,lng],...]
  let inne=false; for(let i=0,j=pts.length-1;i<pts.length;j=i++){ const yi=pts[i][0],xi=pts[i][1],yj=pts[j][0],xj=pts[j][1];
    const snitt=((yi>p.lat)!==(yj>p.lat)) && (p.lng < (xj-xi)*(p.lat-yi)/((yj-yi)||1e-12)+xi); if(snitt) inne=!inne; } return inne; }
function objektInne(z,p){ return (z.points&&z.points.length>=3) ? punktIPolygon(p,z.points) : havKm({lat:z.lat,lng:z.lng},p) <= z.radieKm; }
function zonAktivNu(z){
  if(!z.aktivFran||!z.aktivTill) return true;
  const now=new Date(); const wd=now.getDay();
  if(z.dagar&&z.dagar.length&&!z.dagar.includes(wd)) return false;
  const cur=now.getHours()*60+now.getMinutes();
  const [fh,fm]=z.aktivFran.split(":").map(Number); const [th,tm]=z.aktivTill.split(":").map(Number);
  const f=fh*60+fm, t=th*60+tm; return f<=t ? (cur>=f&&cur<=t) : (cur>=f||cur<=t);
}
function zonBrott(z){ if(!zonAktivNu(z)) return []; return (z.objektIds||[]).filter(oid=>{ const o=ALLAOBJEKT.find(x=>x.id===oid); const p=objektPos(o); if(!p)return false; const inne=objektInne(z,p); return z.regel==="ej_in" ? inne : !inne; }); }
function havKm(a,b){ const R=6371,toRad=d=>d*Math.PI/180; const dLat=toRad(b.lat-a.lat),dLng=toRad(b.lng-a.lng); const s=Math.sin(dLat/2)**2+Math.cos(toRad(a.lat))*Math.cos(toRad(b.lat))*Math.sin(dLng/2)**2; return R*2*Math.atan2(Math.sqrt(s),Math.sqrt(1-s)); }
const ZONER_INIT=[{id:"z0",namn:"Arbetsområde Västerås",lat:59.6105,lng:16.5448,radieKm:3,regel:"stanna_inne",objektIds:["m1","m2","m3"]}];

  if(r.hogstaHastighet>=110){ HANDELSER.push({id:"h"+HANDELSER.length,forareId:r.forareId,forareNamn:r.forareNamn,fordonRegNr:r.fordonRegNr,typ:"Fortkörning "+r.hogstaHastighet+" km/h",kat:"fortkorning",tid:r.startTid,gkraft:"–",allvar:r.hogstaHastighet>=125?"hog":"medel"}); } });
HANDELSER.sort((a,b)=>b.tid-a.tid);
function forarbeteende(){ return FORARE.map(d=>{ const ev=HANDELSER.filter(h=>h.forareId===d.id); const c={inbromsning:0,acceleration:0,kurva:0,fortkorning:0}; ev.forEach(h=>c[h.kat]++);
  const score=Math.max(20,Math.min(100,Math.round(100 - c.fortkorning*5 - c.inbromsning*3 - c.acceleration*3 - c.kurva*2))); return {driver:d,...c,total:ev.length,score}; }).sort((a,b)=>b.score-a.score); }

function matchaTankkort(tx){
  let best=null;
  FORDON.forEach(v=>{ RESOR.filter(r=>r.fordonId===v.id).forEach(r=>{
    const dt=Math.abs(tx.tidObj-r.stoppTid)/60000; if(dt>180) return;
    const dist=hav({lat:tx.lat,lng:tx.lng},{lat:r.stoppLat,lng:r.stoppLng}); if(dist>6) return;
    const score=100-dist*16-dt*0.5; if(!best||score>best.score) best={v,score,dt:Math.round(dt),dist:Math.round(dist*10)/10}; }); });
  if(!best||best.score<45) return {fordon:null,konfidens:best?Math.max(0,Math.round(best.score)):0,detalj:best};
  return {fordon:best.v,konfidens:Math.min(99,Math.round(best.score)),detalj:best};
}

function detekteraAvvikelser(resor){
  const out=[];
  resor.forEach(r=>{
    const wd=r.startTid.getDay(), h=r.startTid.getHours();
    if(r.hogstaHastighet>=110) out.push({id:r.id,r,allvar:r.hogstaHastighet>=125?"hog":"medel",typ:"Fortkörning",text:r.fordonRegNr+" nådde "+r.hogstaHastighet+" km/h ("+r.forareNamn+")"});

    if(r.resetyp==="Privatresa"&&wd>=1&&wd<=5&&h>=8&&h<17) out.push({id:r.id,r,allvar:"medel",typ:"Privat på arbetstid",text:"Privatresa markerad under kontorstid"});
    if(r.avstandKm>4 && r.forbrukningLiter > r.avstandKm*0.07*1.4) out.push({id:r.id,r,allvar:"lag",typ:"Bränsleavvikelse",text:"Hög förbrukning ("+r.forbrukningLiter+" l) mot sträcka ("+r.avstandKm+" km)"});
  });
  const rank={hog:3,medel:2,lag:1};
  return out.sort((a,b)=>rank[b.allvar]-rank[a.allvar] || b.r.startTid-a.r.startTid);
}
function heurResesyfte(r){
  const office="Sigurdsgatan", wd=r.startTid.getDay(), h=r.startTid.getHours();
  if(r.stoppAdress.includes(office)) return {resetyp:"Tjänsteresa",resesyfte:"Återresa till kontoret"};
  if(r.startAdress.includes(office)&&h>=8&&h<17) return {resetyp:"Tjänsteresa",resesyfte:"Kundbesök"};

function ecoScores(resor){
  const byD={}; resor.forEach(r=>{(byD[r.forareId]=byD[r.forareId]||[]).push(r);});
  return FORARE.map(d=>{ const rs=byD[d.id]||[]; if(!rs.length)return null;
    const avgMax=rs.reduce((s,r)=>s+r.hogstaHastighet,0)/rs.length;
    const totKm=Math.max(1,rs.reduce((s,r)=>s+r.avstandKm,0));
    const lPer10=rs.reduce((s,r)=>s+r.forbrukningLiter,0)/totKm*10;
    const speeders=rs.filter(r=>r.hogstaHastighet>=110).length;
    let score=100-Math.max(0,(avgMax-70))*0.8-speeders*4-Math.max(0,(lPer10-6))*3;
    score=Math.max(20,Math.min(100,Math.round(score)));
    const tips=[]; if(avgMax>95)tips.push("Sänk topphastigheten – jämnare fart sparar bränsle.");
    if(speeders>0)tips.push(speeders+" resa(or) över 110 km/h – håll hastighetsgränserna.");
    if(lPer10>7)tips.push("Hög förbrukning – undvik hård acceleration.");
    if(!tips.length)tips.push("Bra körstil! Fortsätt med jämn hastighet och framförhållning.");
    return {driver:d, score, avgMax:Math.round(avgMax), lPer10:lPer10.toFixed(1), speeders, antal:rs.length, tips};
  }).filter(Boolean).sort((a,b)=>b.score-a.score);
}

  return FORDON.map(v=>{ const interval=15000;
    const nextKm=Math.ceil(v.matarstallningKm/interval)*interval; const kmKvar=nextKm-v.matarstallningKm;
    const perDag=Math.max(1,v.kmIAr/365); const dgrService=Math.round(kmKvar/perDag);

/* ============================ AI-ASSISTENT (chatt + actions) ============================ */
function AIAssistant({resor,setResor,open,setOpen,openSettings}){
  const [msgs,setMsgs]=useState([{role:"assistant",content:"Hej! Jag kan svara på frågor OCH utföra saker. Prova: \"attestera alla resor\", \"fyll i resesyften\", \"markera helgresor som privata\" eller \"exportera körjournalen\"."}]);
  const [input,setInput]=useState(""); const [busy,setBusy]=useState(false); const endRef=useRef();
  useEffect(()=>{ endRef.current&&endRef.current.scrollIntoView({behavior:"smooth"}); },[msgs,busy]);
  const parseAct=(q)=>{ const ql=q.toLowerCase();
    if(/attestera (alla|samtliga)|godkänn alla/.test(ql)){ const n=resor.filter(r=>!r.attesterad).length; setResor(rs=>rs.map(r=>({...r,attesterad:true}))); return "✓ Attesterade "+n+" resor."; }
    if(/(fyll|föreslå|klassa|sätt).*(syfte|resesyfte)/.test(ql)){ let n=0; setResor(rs=>rs.map(r=>{ if(!r.resesyfte.trim()){n++; return {...r,...heurResesyfte(r)};} return r;})); return "✓ Fyllde i resesyfte för "+n+" resor som saknade det."; }
    if(/helg.*(privat)|privat.*helg/.test(ql)){ let n=0; setResor(rs=>rs.map(r=>{const wd=r.startTid.getDay(); if(wd===0||wd===6){n++;return{...r,resetyp:"Privatresa"};}return r;})); return "✓ Markerade "+n+" helgresor som Privatresa."; }
    if(/(exportera|ladda ner|exportera).*(journal|csv|körjournal)/.test(ql)){ exportCSV(resor); return "✓ Exporterade körjournalen som CSV (laddas ner nu)."; }
    return null; };
  const fallback=(q)=>{ const s=dataSammanfattning(resor); const ql=q.toLowerCase();
    if(ql.includes("avvik")||ql.includes("bedräg")) return "Jag har flaggat "+s.antalAvvikelser+" avvikelser. Öppna AI-Insikter för detaljer.";
    if(ql.includes("körde mest")||ql.includes("flest")){ const t=[...s.perForare].sort((a,b)=>b.km-a.km)[0]; return t.namn+" körde mest: "+kr(t.km)+" km på "+t.resor+" resor."; }
    if(ql.includes("tjänst")) return "Totalt "+s.tjansteResor+" tjänsteresor av "+s.antalResor+" resor.";
    if(ql.includes("compliance")||ql.includes("skatteverk")) return "Compliance-score är "+s.compliance+"/100. Se fliken AI-Insikter → Compliance.";
    if(ql.includes("antal resor")||ql.includes("hur många")) return s.antalResor+" resor de senaste 14 dagarna, totalt "+kr(s.totalKm)+" km.";
    return "Lägg till en API-nyckel (kugghjulet) för fria svar. Snabbfakta: "+s.antalResor+" resor, "+kr(s.totalKm)+" km, "+s.antalAvvikelser+" avvikelser, compliance "+s.compliance+"/100."; };
  const send=async(text)=>{
    const q=(text??input).trim(); if(!q||busy)return;
    setMsgs(m=>[...m,{role:"user",content:q}]); setInput("");
    const act=parseAct(q); if(act){ setMsgs(m=>[...m,{role:"assistant",content:act}]); return; }
    setBusy(true);
    try{
      if(AI.available()){
        const sys="Du är Milvys AI-assistent för en svensk fordonsflotta. Svara kort och konkret på svenska, baserat ENBART på denna JSON-data:\n"+JSON.stringify(dataSammanfattning(resor));
        const conv=[...msgs,{role:"user",content:q}].filter(m=>m.role!=="system").slice(-8).map(m=>({role:m.role,content:m.content}));
        const ans=await AI.chat(conv,sys,800); setMsgs(m=>[...m,{role:"assistant",content:ans}]);
      } else { await new Promise(r=>setTimeout(r,350)); setMsgs(m=>[...m,{role:"assistant",content:fallback(q)}]); }
    }catch(e){ setMsgs(m=>[...m,{role:"assistant",content:"⚠ Fel: "+e.message}]); }
    setBusy(false);
  };
  const chips=["Sammanfatta veckan","Attestera alla resor","Fyll i resesyften","Exportera körjournalen"];
  if(!open) return (<button onClick={()=>setOpen(true)} className="fixed bottom-5 right-5 z-[1500] flex items-center gap-2 px-4 py-3 rounded-full text-white shadow-lg hover:scale-105 transition" style={{background:"linear-gradient(135deg,#0E1726,#2F4BFF)"}}><Spark className="w-5 h-5"/><span className="font-medium text-sm">AI-assistent</span></button>);
  return (<div className="fixed bottom-0 right-0 sm:bottom-5 sm:right-5 z-[1500] w-full sm:w-[400px] h-[85vh] sm:h-[600px] bg-white sm:rounded-2xl shadow-2xl border flex flex-col overflow-hidden">
    <div className="flex items-center justify-between px-4 py-3 text-white" style={{background:"linear-gradient(135deg,#0E1726,#2F4BFF)"}}>
      <div className="flex items-center gap-2"><Spark className="w-5 h-5"/><span className="font-semibold">AI-assistent</span>{!AI.available()&&<span className="text-[10px] bg-white/20 px-1.5 py-0.5 rounded">demo-läge</span>}</div>
      <div className="flex items-center gap-1"><button onClick={openSettings} className="p-1.5 hover:bg-white/20 rounded">{COG("w-4 h-4")}</button><button onClick={()=>setOpen(false)} className="p-1.5 hover:bg-white/20 rounded text-lg leading-none">✕</button></div></div>
    <div className="flex-1 overflow-auto p-3 space-y-3 bg-gray-50">
      {msgs.map((m,i)=>(<div key={i} className={"flex "+(m.role==="user"?"justify-end":"justify-start")}><div className={"max-w-[85%] px-3 py-2 rounded-2xl text-sm whitespace-pre-wrap "+(m.role==="user"?"bg-blue-600 text-white rounded-br-sm":"bg-white border rounded-bl-sm")}>{m.content}</div></div>))}
      {busy&&<div className="flex justify-start"><div className="bg-white border rounded-2xl rounded-bl-sm px-4 py-3 ai-typing"><span></span><span></span><span></span></div></div>}
      <div ref={endRef}/></div>

// Liten markdown→HTML för AI-svar (rubriker, fetstil, punktlistor)
function mdLite(str){
  let s=String(str||"").trim().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  s=s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  s=s.replace(/(^|[^*])\*(?!\s)([^*\n]+?)\*(?!\*)/g,'$1<em>$2</em>');
  s=s.replace(/^\s*#{1,6}\s*(.+)$/gm,'<div class="font-semibold text-gray-800 mt-1.5 first:mt-0">$1</div>');
  s=s.replace(/^\s*[-•]\s+(.+)$/gm,'<div class="flex gap-1.5"><span class="text-[#2F4BFF]">•</span><span>$1</span></div>');
  s=s.replace(/\n/g,'<br/>').replace(/<\/div><br\/>/g,'</div>');
  return s;
}
function AIDailyBrief({resor}){
  const [txt,setTxt]=useState(""); const [busy,setBusy]=useState(false);
  const heur=()=>{ const s=dataSammanfattning(resor); const top=[...s.perForare].sort((a,b)=>b.km-a.km)[0];
    return s.antalResor+" resor och "+kr(s.totalKm)+" km de senaste 14 dagarna ("+s.tjansteResor+" tjänste / "+s.privatResor+" privat). "+top.namn+" körde mest. Compliance "+s.compliance+"/100, "+s.antalAvvikelser+" avvikelser att se över."; };
  useEffect(()=>{ let on=true; (async()=>{ if(AI.available()){ setBusy(true); try{ const a=await AI.chat([{role:"user",content:"Ge en kort daglig brief på 2-3 meningar för flottansvarig. Skriv flytande svenska utan rubrik och utan markdown-symboler (inga # eller **)."}],"Du är Milvys AI. Svara på svenska, kortfattat och utan rubriker. Data:\n"+JSON.stringify(dataSammanfattning(resor)),300); if(on)setTxt(a);}catch(e){if(on)setTxt(heur());} setBusy(false);} else setTxt(heur()); })(); return ()=>{on=false;}; },[]);
  return busy?<span className="ai-typing"><span></span><span></span><span></span></span>:<div className="text-sm text-gray-700 leading-relaxed" dangerouslySetInnerHTML={{__html:mdLite(txt)}}/>;
}

  const [toast,setToast]=useState("");
  const up=(k,v)=>setF(s=>({...s,[k]:v}));
  const nt=(k)=>setF(s=>({...s,notiser:{...(s.notiser||{}),[k]:!(s.notiser||{})[k]}}));
  const scanRfid=()=>{ up("rfidNr",String(Math.floor(Math.random()*9000000)+1000000)); setToast("RFID-brik inläst ✓"); setTimeout(()=>setToast(""),1800); };
  const invite=()=>{ setToast("App-inbjudan skickad till "+(f.epost||"föraren")); setTimeout(()=>setToast(""),2200); };

  const dr=resor.filter(r=>r.forareId===f.id);
  const tjmil=Math.round(dr.filter(r=>r.resetyp==="Tjänsteresa").reduce((s,r)=>s+r.avstandKm,0)/10*10)/10;
  const eco=ecoScores(resor).find(e=>e.driver.id===f.id);
  const beh=forarbeteende().find(e=>e.driver.id===f.id);
  const senaste=dr[0];
  const inp="w-full px-3 py-2 border rounded-lg text-sm";
  const lbl="text-[10px] font-mono uppercase tracking-[0.08em] text-[#8A93A0]";
  const Sektion=({t,children})=>(<div className="space-y-2"><div className={lbl}>{t}</div>{children}</div>);
  return (<div className="fixed inset-0 bg-black/50 flex items-center justify-center z-[3000] p-4" onClick={onClose}>
    <Card className="w-[760px] max-w-full max-h-[92vh] overflow-auto" onClick={e=>e.stopPropagation()}>
      <div className="flex items-center justify-between p-5 border-b" style={{background:"#0E1726"}}>
        <div className="flex items-center gap-3"><div className="w-10 h-10 rounded-full bg-[#C2F24D] flex items-center justify-center font-semibold text-[#0E1726]">{(f.namn||"NY").split(" ").map(x=>x[0]).slice(0,2).join("").toUpperCase()}</div>
          <div><div className="font-display font-bold text-white text-[15px]">{driver._ny?"Ny förare":f.namn||"Redigera förare"}</div><div className="font-mono text-[11px] text-[#8FA0B8]">{f.titel} · {f.status==="inaktiv"?"Inaktiv":"Aktiv"}</div></div></div>
        <button onClick={onClose} className="text-[#8FA0B8] hover:text-white text-xl">✕</button></div>
      <div className="grid md:grid-cols-[1.4fr_1fr]">
        <div className="p-5 space-y-4 border-r">
          <Sektion t="Personuppgifter">
            <input value={f.namn||""} onChange={e=>up("namn",e.target.value)} placeholder="För- och efternamn" className={inp}/>
            <div className="grid grid-cols-2 gap-2"><input value={f.epost} onChange={e=>up("epost",e.target.value)} placeholder="E-post" className={inp}/><input value={f.mobil} onChange={e=>up("mobil",e.target.value)} placeholder="Mobil" className={inp}/></div>
          </Sektion>
          <Sektion t="Roll & behörighet">
            <select value={f.titel} onChange={e=>up("titel",e.target.value)} className={inp}><option>Administratör</option><option>Projektledare</option><option>Förare</option></select>
            <div className="text-[11px] text-gray-500">{f.titel==="Administratör"?"Full åtkomst: flotta, granskning, export och inställningar.":f.titel==="Projektledare"?"Ser sitt teams fordon och körningar, kan attestera.":"Ser och klassar bara sina egna körningar."}</div>
          </Sektion>
          <Sektion t="Fordon & föraridentifiering">
            <select value={f.kopplatFordonId} onChange={e=>up("kopplatFordonId",e.target.value)} className={inp}><option value="">Inget kopplat fordon</option>{FORDON.map(v=>(<option key={v.id} value={v.id}>{v.regNr} – {v.fabrikat} {v.modell}</option>))}</select>
            <div className="flex gap-2"><input value={f.rfidNr} onChange={e=>up("rfidNr",e.target.value)} placeholder="RFID-nr (förarbrik)" className={inp}/><button onClick={scanRfid} className="px-3 py-2 rounded-lg border text-sm whitespace-nowrap">Scanna brik</button></div>
          </Sektion>
          <Sektion t="Körkort">
            <div className="grid grid-cols-2 gap-2"><select value={f.korkortsklass} onChange={e=>up("korkortsklass",e.target.value)} className={inp}>{["AM","A","B","BE","C","CE","D"].map(k=>(<option key={k}>{k}</option>))}</select>
              <div><input type="date" value={f.korkortGiltigt} onChange={e=>up("korkortGiltigt",e.target.value)} className={inp}/></div></div>
            {dgrKort!=null&&dgrKort<60&&<div className={"text-[11px] "+(dgrKort<0?"text-red-600":"text-amber-600")}>⚠ Körkort {dgrKort<0?"har gått ut":"går ut om "+dgrKort+" dagar"} – påminn föraren.</div>}
          </Sektion>
          <Sektion t="Ersättning & lön">
            <div className="grid grid-cols-2 gap-2"><input value={f.anstallningsnr} onChange={e=>up("anstallningsnr",e.target.value)} placeholder="Anställningsnr" className={inp}/><input value={f.avdelning} onChange={e=>up("avdelning",e.target.value)} placeholder="Avdelning / kostnadsställe" className={inp}/></div>
            <div className="flex items-center gap-2"><span className="text-sm text-gray-500">Milersättning</span><input value={f.milersattning} onChange={e=>up("milersattning",e.target.value)} type="number" className="w-24 px-3 py-2 border rounded-lg text-sm"/><span className="text-sm text-gray-500">kr/mil</span></div>
          </Sektion>
          <Sektion t="Notiser">
            <div className="flex flex-wrap gap-3 text-sm">{[["epost","E-post"],["sms","SMS"],["push","Push i appen"]].map(([k,l])=>(<label key={k} className="flex items-center gap-2"><input type="checkbox" checked={!!(f.notiser||{})[k]} onChange={()=>nt(k)}/> {l}</label>))}</div>
          </Sektion>
          <Sektion t="Status">
            <select value={f.status} onChange={e=>up("status",e.target.value)} className={inp}><option value="aktiv">Aktiv</option><option value="inaktiv">Inaktiv (arkiverad)</option></select>

        </div>
        <div className="p-5 space-y-4 bg-gray-50/60">
          <div className={lbl}>Förarstatistik</div>
          <div className="grid grid-cols-2 gap-2">
            <Card className="p-3"><div className="text-xl font-mono font-semibold">{dr.length}</div><div className="text-[9px] font-mono uppercase tracking-wide text-[#8A93A0] mt-1">Resor (14 d)</div></Card>
            <Card className="p-3"><div className="text-xl font-mono font-semibold">{tjmil}</div><div className="text-[9px] font-mono uppercase tracking-wide text-[#8A93A0] mt-1">Tjänstemil</div></Card>
            <Card className="p-3"><div className={"text-xl font-mono font-semibold "+(eco?(eco.score>=80?"text-green-600":eco.score>=60?"text-amber-600":"text-red-600"):"text-gray-300")}>{eco?eco.score:"–"}</div><div className="text-[9px] font-mono uppercase tracking-wide text-[#8A93A0] mt-1">Eco-score</div></Card>
            <Card className="p-3"><div className={"text-xl font-mono font-semibold "+(beh?(beh.score>=80?"text-green-600":beh.score>=60?"text-amber-600":"text-red-600"):"text-gray-300")}>{beh?beh.score:"–"}</div><div className="text-[9px] font-mono uppercase tracking-wide text-[#8A93A0] mt-1">Förarbeteende</div></Card>
          </div>
          {senaste&&<div className="text-[11px] text-gray-500">Senaste resa: {senaste.startAdress.split(",")[0]} → {senaste.stoppAdress.split(",")[0]} ({fmtKlock(senaste.startTid)})</div>}
          <div className={lbl}>Snabbåtgärder</div>
          <button onClick={invite} className="w-full px-3 py-2 rounded-lg border text-sm text-left">📲 Skicka app-inbjudan</button>
          <button onClick={scanRfid} className="w-full px-3 py-2 rounded-lg border text-sm text-left">🔑 Tilldela ny RFID-brik</button>
          <div className="text-[11px] text-gray-400">Inbjudan låter föraren klassa sina resor i mobilappen och få notiser.</div>
        </div>
      </div>
      {toast&&<div className="px-5 py-2 text-sm text-center" style={{background:"#0E1726",color:"#C2F24D"}}>{toast}</div>}
      <div className="flex items-center justify-between gap-2 p-4 border-t">
        <div className="text-[11px] text-gray-400">{driver._ny?"Ny förare läggs till i flottan.":"Ändringar sparas i föraröversikten."}</div>
        <div className="flex gap-2"><button onClick={onClose} className="px-4 py-2 text-sm rounded-lg border">Avbryt</button>
          <button onClick={()=>onSave(f)} disabled={!f.namn||!f.namn.trim()} className="px-4 py-2 text-sm rounded-lg text-white disabled:opacity-50" style={{background:"#0E1726"}}>Spara förare</button></div>
      </div>
    </Card></div>);
}

/* ============================ KARTA ============================ */
function Karta({priv}){
  const mapRef=useRef(); const map=useRef(); const markers=useRef({});
  const [endastRorelse,setER]=useState(false); const [sel,setSel]=useState(null);
  const [live,setLive]=useState(false); const [liveData,setLiveData]=useState([]); const [status,setStatus]=useState("");
  const hasToken=!!FLESPI.token();
  const mockFordon=FORDON.filter(v=>!endastRorelse||v.status==="aktiv");
  async function hamtaLive(){ setStatus("Hämtar från flespi…");
    try{ const [devs,tel]=await Promise.all([FLESPI.devices(), FLESPI._get("/gw/devices/all/telemetry")]);
      const tm={}; (tel||[]).forEach(t=>tm[t.id]=t.telemetry||{}); const g=(t,k)=> t[k]&&t[k].value;
      const data=(devs||[]).map(d=>{ const t=tm[d.id]||{}; const lat=g(t,"position.latitude"), lng=g(t,"position.longitude"); const tsRaw=t["position.latitude"]&&t["position.latitude"].ts;
        return {id:d.id,name:d.name||("#"+d.id),lat,lng,speed:Math.round(g(t,"position.speed")||0),ignition:g(t,"engine.ignition.status"),ts:tsRaw?new Date(tsRaw*1000):null,active:lat!=null&&lng!=null}; });
      setLiveData(data); const akt=data.filter(d=>d.active).length; setStatus("✓ "+akt+" enhet(er) med position · "+(data.length-akt)+" väntar på data");
    }catch(e){ setStatus("✗ "+e.message); setLiveData([]); } }
  useEffect(()=>{ map.current=L.map(mapRef.current).setView([59.61,16.55],8); L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"© OpenStreetMap",maxZoom:19}).addTo(map.current);
    const inv=()=>{ if(map.current) map.current.invalidateSize(); }; const t1=setTimeout(inv,250), t2=setTimeout(inv,800); window.addEventListener("resize",inv);
    return ()=>{ clearTimeout(t1); clearTimeout(t2); window.removeEventListener("resize",inv); map.current.remove(); }; },[]);
  useEffect(()=>{ if(live) hamtaLive(); },[live]);
  useEffect(()=>{ if(!map.current)return; Object.values(markers.current).forEach(m=>map.current.removeLayer(m)); markers.current={};
    if(live){ liveData.filter(d=>d.active).forEach(d=>{ const m=L.marker([d.lat,d.lng]).addTo(map.current); m.bindPopup("<b>"+d.name+"</b><br>"+(d.ts?fmtKlock(d.ts):"")+"<br>"+d.speed+" km/h"+(d.ignition?" · tändning på":"")); markers.current["d"+d.id]=m; }); }
    else { mockFordon.forEach(v=>{ const p=SENASTE_POS[v.id]; if(!p)return; const m=L.marker([p.lat,p.lng]).addTo(map.current); m.bindPopup("<b>"+v.regNr+"</b><br>"+v.fordonsansvarig+"<br>"+fmtKlock(p.tid)+"<br>"+p.hast+" km/h"); markers.current[v.id]=m; }); }
  },[live,liveData,endastRorelse]);
  const centerMock=(v)=>{ const p=SENASTE_POS[v.id]; if(!p)return; setSel(v.id); map.current.setView([p.lat,p.lng],13); markers.current[v.id]&&markers.current[v.id].openPopup(); };
  const centerLive=(d)=>{ if(!d.active)return; setSel("d"+d.id); map.current.setView([d.lat,d.lng],13); markers.current["d"+d.id]&&markers.current["d"+d.id].openPopup(); };
  return (<div className="space-y-4">
    <div className="flex items-center justify-between flex-wrap gap-2"><h1 className="text-xl font-bold text-gray-800">Aktuella positioner</h1>
      <div className="flex items-center gap-2">{hasToken&&<button onClick={()=>setLive(!live)} className={"px-3 py-2 rounded-lg text-sm font-medium "+(live?"bg-green-600 text-white":"border")}>{live?"● Live (flespi)":"Visa live från flespi"}</button>}{live&&<button onClick={hamtaLive} className="px-3 py-2 rounded-lg border text-sm">↻ Uppdatera</button>}</div></div>
    {!hasToken&&<div className="text-sm bg-amber-50 text-amber-800 rounded-lg px-3 py-2">Lägg in din flespi-token under kugghjulet för att visa riktiga fordon. Visar mockdata tills dess.</div>}
    {live&&status&&<div className="text-sm bg-gray-50 rounded-lg px-3 py-2">{status}</div>}
    <div className="grid md:grid-cols-[300px_1fr] gap-4">
      <Card className="p-3 h-[520px] overflow-auto">
        {!live&&<><label className="flex items-center gap-2 text-sm mb-3 px-1"><input type="checkbox" checked={endastRorelse} onChange={e=>setER(e.target.checked)}/> Visa endast aktiva fordon</label>
          {mockFordon.map(v=>(<button key={v.id} onClick={()=>centerMock(v)} className={"w-full text-left px-3 py-2 rounded-lg mb-1 "+(sel===v.id?"bg-blue-50":"hover:bg-gray-100")}><div className="flex justify-between items-center"><span className="font-medium text-sm">{v.regNr}</span><Badge color={v.status==="aktiv"?"gron":"gra"}>{v.status}</Badge></div><div className="text-xs text-gray-500">{v.fordonsansvarig}</div></button>))}</>}
        {live&&<>{liveData.length===0&&<div className="text-sm text-gray-400 p-3">Inga enheter / ingen data ännu.</div>}
          {liveData.map(d=>(<button key={d.id} onClick={()=>centerLive(d)} className={"w-full text-left px-3 py-2 rounded-lg mb-1 "+(sel==="d"+d.id?"bg-blue-50":"hover:bg-gray-100")}><div className="flex justify-between items-center"><span className="font-medium text-sm">{d.name}</span><Badge color={d.active?"gron":"gra"}>{d.active?"online":"väntar"}</Badge></div><div className="text-xs text-gray-500">{d.active?(d.speed+" km/h"+(d.ts?" · "+fmtTid(d.ts):"")):"ingen position än"}</div></button>))}</>}
      </Card>
      <Card className="overflow-hidden h-[520px]"><div ref={mapRef} className="w-full h-full"></div></Card>
    </div></div>);
}

/* ============================ KÖRJOURNAL ============================ */
function TripMapModal({resa,onClose}){
  const ref=useRef(); const map=useRef(); const baseRef=useRef(); const carRef=useRef(); const travRef=useRef();
  const path=useMemo(()=>{ const n=26,out=[]; const dLat=resa.stoppLat-resa.startLat, dLng=resa.stoppLng-resa.startLng; const dur=resa.stoppTid-resa.startTid;
    for(let i=0;i<=n;i++){ const t=i/n, cu=Math.sin(t*Math.PI);
      out.push({ lat:resa.startLat+dLat*t+(-dLng)*cu*0.12+Math.sin(i*1.7)*0.0004, lng:resa.startLng+dLng*t+dLat*cu*0.12+Math.cos(i*1.9)*0.0004,
        tid:new Date(resa.startTid.getTime()+dur*t), speed:Math.max(0,Math.round(resa.hogstaHastighet*(0.45+0.55*Math.sin(t*Math.PI)))) }); }
    return out; },[resa.id]);
  const [idx,setIdx]=useState(0); const [playing,setPlaying]=useState(true); const [speed,setSpeed]=useState(5); const [sat,setSat]=useState(false);
  const medel=Math.round(resa.avstandKm/Math.max(0.1,resa.restidMin/60));
  const OSM="https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", ESRI="https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}";
  useEffect(()=>{ const m=L.map(ref.current); map.current=m; baseRef.current=L.tileLayer(OSM,{attribution:"© OpenStreetMap"}).addTo(m);
    const ll=path.map(p=>[p.lat,p.lng]);
    L.polyline(ll,{color:"#0E1726",weight:5,opacity:.22}).addTo(m);
    travRef.current=L.polyline([ll[0]],{color:"#2F4BFF",weight:5}).addTo(m);
    L.circleMarker(ll[0],{radius:6,color:"#16a34a",fillColor:"#16a34a",fillOpacity:1}).addTo(m).bindPopup("Start "+fmtTid(resa.startTid));
    L.circleMarker(ll[ll.length-1],{radius:6,color:"#dc2626",fillColor:"#dc2626",fillOpacity:1}).addTo(m).bindPopup("Stopp "+fmtTid(resa.stoppTid));
    carRef.current=L.marker(ll[0],{icon:L.divIcon({className:"",html:'<div style="width:16px;height:16px;border-radius:50%;background:#0E1726;border:3px solid #C2F24D"></div>',iconSize:[16,16],iconAnchor:[8,8]})}).addTo(m).bindTooltip("",{permanent:true,direction:"top",offset:[0,-8]});
    m.fitBounds(ll,{padding:[40,40]}); const t=setTimeout(()=>m.invalidateSize(),250); return ()=>{ clearTimeout(t); m.remove(); }; },[]);
  useEffect(()=>{ if(baseRef.current) baseRef.current.setUrl(sat?ESRI:OSM); },[sat]);
  useEffect(()=>{ if(!playing)return; const iv=setInterval(()=>{ setIdx(i=> i>=path.length-1 ? i : i+1); },420/speed); return ()=>clearInterval(iv); },[playing,speed,path]);
  useEffect(()=>{ if(idx>=path.length-1) setPlaying(false); const p=path[idx]; if(!p||!carRef.current)return; carRef.current.setLatLng([p.lat,p.lng]); carRef.current.setTooltipContent(p.speed+" km/h · "+fmtTid(p.tid)); if(travRef.current) travRef.current.setLatLngs(path.slice(0,idx+1).map(q=>[q.lat,q.lng])); },[idx]);
  const klar=idx>=path.length-1;
  return (<div className="fixed inset-0 bg-black/50 flex items-center justify-center z-[2000] p-2 sm:p-4" onClick={onClose}>
    <Card className="w-[920px] max-w-full overflow-hidden" onClick={e=>e.stopPropagation()}>
      <div className="flex items-stretch border-b text-sm overflow-x-auto">
        {[["Reg nr",resa.fordonRegNr],["Reseid",resa.id],["Förare",resa.forareNamn],["Avstånd",resa.avstandKm+" km"],["Medel",medel+" km/h"],["Högsta",resa.hogstaHastighet+" km/h"]].map(([l,v],i)=>(<div key={l} className="px-4 py-2 border-r flex-1 min-w-[105px]"><div className="text-[10px] font-mono uppercase tracking-wide text-[#8A93A0]">{l}</div><div className="font-semibold truncate">{v}</div></div>))}
        <button onClick={onClose} className="px-3 text-gray-400 hover:text-gray-700 text-xl shrink-0">✕</button>
      </div>
      <div className="flex flex-wrap items-center gap-2 px-3 py-2 border-b bg-gray-50">
        <div className="flex rounded-lg overflow-hidden border"><button onClick={()=>setSat(false)} className={"px-3 py-1.5 text-sm "+(!sat?"bg-[#0E1726] text-white":"bg-white")}>Karta</button><button onClick={()=>setSat(true)} className={"px-3 py-1.5 text-sm "+(sat?"bg-[#0E1726] text-white":"bg-white")}>Satellit</button></div>
        <button onClick={()=>setSpeed(s=>s===1?5:1)} className="px-3 py-1.5 rounded-lg border text-sm font-mono">x{speed}</button>
        <button onClick={()=>{ if(klar){ setIdx(0); setPlaying(true); } else setPlaying(p=>!p); }} className="px-3 py-1.5 rounded-lg text-white text-sm" style={{background:"#0E1726"}}>{klar?"↻ Spela igen":(playing?"❚❚ Paus":"► Spela")}</button>
        <input type="range" min="0" max={path.length-1} value={idx} onChange={e=>{ setIdx(Number(e.target.value)); setPlaying(false); }} className="flex-1 min-w-[120px]"/>
        <span className="text-xs font-mono text-gray-500 whitespace-nowrap">{fmtKlock(resa.startTid)} – {fmtTid(resa.stoppTid)}</span>
      </div>
      <div ref={ref} style={{height:440}}></div>
    </Card></div>);
}
function DayRouteModal({resor,datum,onClose}){
  const ref=useRef();
  useEffect(()=>{ const m=L.map(ref.current); L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"© OpenStreetMap"}).addTo(m);
    const allp=[], farger=["#2F4BFF","#0E1726","#16a34a","#dc2626","#a855f7","#ea580c","#0891b2","#d97706"];
    resor.forEach((r,i)=>{ if(r.startLat==null)return; const a=[r.startLat,r.startLng], b=[r.stoppLat,r.stoppLng], c=farger[i%farger.length];
      L.polyline([a,b],{color:c,weight:4,opacity:.8}).addTo(m).bindPopup(r.forareNamn+" · "+r.avstandKm+" km · "+fmtTid(r.startTid));
      L.circleMarker(a,{radius:4,color:c,fillColor:c,fillOpacity:1}).addTo(m); allp.push(a,b); });
    if(allp.length) m.fitBounds(allp,{padding:[40,40]});
    const t=setTimeout(()=>m.invalidateSize(),250); return ()=>{ clearTimeout(t); m.remove(); }; },[]);
  const totKm=resor.reduce((s,r)=>s+r.avstandKm,0);
  return (<div className="fixed inset-0 bg-black/50 flex items-center justify-center z-[2000] p-2 sm:p-4" onClick={onClose}>
    <Card className="w-[900px] max-w-full overflow-hidden" onClick={e=>e.stopPropagation()}>
      <div className="flex justify-between items-center p-4 border-b"><div><div className="font-bold">Dagsrutt {datum}</div><div className="text-xs text-gray-500">{resor.length} resor · {totKm.toFixed(1)} km totalt</div></div><button onClick={onClose} className="text-gray-400 hover:text-gray-700 text-xl">✕</button></div>
      <div ref={ref} style={{height:460}}></div></Card></div>);
}
function Korjournal({resor,setResor,priv}){
  const [reg,setReg]=useState(""), [forare,setForare]=useState(""), [typ,setTyp]=useState(""), [fran,setFran]=useState(""), [till,setTill]=useState(""), [utan,setUtan]=useState(false);
  const [mapTrip,setMapTrip]=useState(null); const [aiBusy,setAiBusy]=useState(false); const [aiInfo,setAiInfo]=useState("");
  const flaggade=useMemo(()=>new Set(detekteraAvvikelser(resor).map(a=>a.id)),[resor]);
  const filt=resor.filter(r=>{ if(reg&&!r.fordonRegNr.toLowerCase().includes(reg.toLowerCase()))return false; if(forare&&r.forareId!==forare)return false; if(typ&&r.resetyp!==typ)return false; if(utan&&r.resesyfte.trim())return false; if(fran&&fmtDatum(r.startTid)<fran)return false; if(till&&fmtDatum(r.startTid)>till)return false; return true; });
  const grupper={}; filt.forEach(r=>{ const d=fmtDatum(r.startTid); (grupper[d]=grupper[d]||[]).push(r); });

    <div className="flex gap-1 border-b overflow-x-auto">{tabs.map(([k,l])=>(<button key={k} onClick={()=>setTab(k)} className={"px-4 py-2 text-sm font-medium -mb-px border-b-2 whitespace-nowrap flex items-center gap-1.5 "+(tab===k?"border-[#2F4BFF] text-[#2F4BFF]":"border-transparent text-gray-500 hover:text-gray-700")}>{l}{tabCount[k]>0&&<span className={"text-[10px] font-semibold px-1.5 py-0.5 rounded-full "+(tab===k?"bg-[#2F4BFF] text-white":"bg-gray-200 text-gray-600")}>{tabCount[k]}</span>}</button>))}</div>

    {tab==="avvik"&&<Card className="overflow-hidden"><table className="w-full text-sm"><thead><tr className="text-left text-gray-500 bg-gray-50 border-b"><th className="px-4 py-2">Allvar</th><th>Typ</th><th>Beskrivning</th><th>Fordon</th><th>Tid</th></tr></thead><tbody>{avvik.slice(0,60).map((a,i)=>(<tr key={i} className="border-b last:border-0 hover:bg-gray-50"><td className="px-4 py-2"><Badge color={allvarF[a.allvar]}>{allvarT[a.allvar]}</Badge></td><td className="font-medium">{a.typ}</td><td className="text-gray-600">{a.text}</td><td>{a.r.fordonRegNr}</td><td className="text-gray-500 whitespace-nowrap">{fmtKlock(a.r.startTid)}</td></tr>))}{avvik.length===0&&<tr><td colSpan="5" className="p-8 text-center text-gray-400">Inga avvikelser.</td></tr>}</tbody></table></Card>}

    {tab==="eco"&&<div className="grid md:grid-cols-2 gap-3">{eco.map((e,i)=>(<Card key={e.driver.id} className="p-4"><div className="flex items-center justify-between mb-2"><div className="flex items-center gap-2"><span className="text-gray-400 font-bold">#{i+1}</span><span className="font-semibold">{e.driver.namn}</span></div><div className={"text-2xl font-bold "+(e.score>=80?"text-green-600":e.score>=60?"text-amber-600":"text-red-600")}>{e.score}<span className="text-sm text-gray-400">/100</span></div></div><div className="w-full bg-gray-100 rounded-full h-2 mb-3"><div className={"h-2 rounded-full "+(e.score>=80?"bg-green-500":e.score>=60?"bg-amber-500":"bg-red-500")} style={{width:e.score+"%"}}></div></div><div className="text-xs text-gray-500 flex gap-3 mb-2"><span>Snittfart topp: {e.avgMax} km/h</span><span>{e.lPer10} l/10km</span><span>{e.speeders} fortkörn.</span></div><ul className="text-sm text-gray-700 space-y-1">{e.tips.map((t,j)=>(<li key={j} className="flex gap-1.5"><span className="text-[#2F4BFF]">•</span>{t}</li>))}</ul></Card>))}</div>}

      <div className="grid md:grid-cols-2 gap-3">{fb.map((e,i)=>(<Card key={e.driver.id} className="p-4">

        <div className="w-full bg-gray-100 rounded-full h-2 mb-3"><div className={"h-2 rounded-full "+(e.score>=80?"bg-green-500":e.score>=60?"bg-amber-500":"bg-red-500")} style={{width:e.score+"%"}}></div></div>
        <div className="grid grid-cols-4 gap-2 text-center">{[["Inbroms.",e.inbromsning],["Accel.",e.acceleration],["Kurva",e.kurva],["Fortkörn.",e.fortkorning]].map(([l,n])=>(<div key={l} className="bg-gray-50 rounded-lg py-2"><div className={"font-mono font-semibold "+(n>0?"text-[#0E1726]":"text-gray-300")}>{n}</div><div className="text-[9px] font-mono uppercase tracking-wide text-[#8A93A0] mt-0.5">{l}</div></div>))}</div></Card>))}</div>
      <Card className="overflow-hidden"><div className="px-4 py-2 bg-gray-50 border-b text-sm font-semibold text-gray-700">Senaste händelser</div>

        <tbody>{HANDELSER.slice(0,30).map(h=>(<tr key={h.id} className="border-b last:border-0 hover:bg-gray-50"><td className="px-4 py-2"><Badge color={h.allvar==="hog"?"rod":"gul"}>{h.allvar==="hog"?"Hög":"Medel"}</Badge></td><td className="font-medium">{h.typ}</td><td>{h.forareNamn}</td><td>{h.fordonRegNr}</td><td className="font-mono">{h.gkraft}{h.gkraft!=="–"?" g":""}</td><td className="text-gray-500 whitespace-nowrap">{fmtKlock(h.tid)}</td></tr>))}</tbody></table></div></Card>
    </div>}
    {tab==="compliance"&&<div className="space-y-3"><Card className="p-5"><div className="flex items-center gap-4"><div className="relative w-28 h-28 shrink-0"><svg className="w-28 h-28 -rotate-90" viewBox="0 0 36 36"><circle cx="18" cy="18" r="16" fill="none" stroke="#eee" strokeWidth="3"/><circle cx="18" cy="18" r="16" fill="none" stroke={cs.avg>=90?"#16a34a":cs.avg>=70?"#f59e0b":"#dc2626"} strokeWidth="3" strokeDasharray={cs.avg+", 100"} strokeLinecap="round"/></svg><div className="absolute inset-0 flex flex-col items-center justify-center"><span className="text-2xl font-bold">{cs.avg}</span><span className="text-xs text-gray-400">/100</span></div></div>
      <div><div className="flex items-center gap-2 mb-1"><span className="font-semibold text-gray-800">Skatteverket-status</span>{cs.klar?<Badge color="gron">Redo för granskning</Badge>:<Badge color="gul">Åtgärder krävs</Badge>}</div>
        <p className="text-sm text-gray-600 mb-2">{cs.utanSyfte} resor saknar resesyfte, {cs.ejAtt} är ej attesterade. En komplett körjournal kräver syfte, korrekt klassning och attestering på varje resa.</p>
        <button onClick={()=>{ setResor(rs=>rs.map(r=>r.resesyfte.trim()?r:{...r,...heurResesyfte(r)})); }} className="px-3 py-2 rounded-lg text-white text-sm" style={{background:"linear-gradient(135deg,#0E1726,#2F4BFF)"}}>Åtgärda saknade syften automatiskt</button></div></div></Card>
      <Card className="p-4"><div className="text-sm font-semibold text-gray-700 mb-2">Vanligaste brister</div><div className="space-y-1 text-sm"><div className="flex justify-between"><span>Saknar resesyfte</span><Badge color={cs.utanSyfte?"gul":"gron"}>{cs.utanSyfte} st</Badge></div><div className="flex justify-between"><span>Ej attesterade</span><Badge color={cs.ejAtt?"gul":"gron"}>{cs.ejAtt} st</Badge></div></div></Card></div>}

    {tab==="flottopt"&&<div className="space-y-3"><Card className="p-4 border-[#C7D1FF] bg-[#EEF1FF]/40"><div className="text-sm text-gray-700">{(()=>{const k=fu.filter(f=>f.farg==="rod").length, p=fu.filter(f=>f.farg==="gul").length; return k||p?("AI ser "+k+" fordon med mycket lågt utnyttjande (kandidater för avveckling) och "+p+" som bör läggas i bilpool. Att avveckla en sällan använd bil sparar typiskt 4 000–6 000 kr/mån i leasing och försäkring."):"Flottan utnyttjas väl – inga uppenbara nedskärningskandidater.";})()}</div></Card>
      <Card className="overflow-hidden"><table className="w-full text-sm"><thead><tr className="text-left text-gray-500 bg-gray-50 border-b"><th className="px-4 py-2">Utnyttjande</th><th>Fordon</th><th>Dagar (av 14)</th><th>Resor</th><th>Sträcka</th><th>Rekommendation</th></tr></thead><tbody>{fu.map(f=>(<tr key={f.v.id} className="border-b last:border-0 hover:bg-gray-50"><td className="px-4 py-2"><div className="flex items-center gap-2"><div className="w-16 bg-gray-100 rounded-full h-2"><div className={"h-2 rounded-full "+(f.farg==="rod"?"bg-red-500":f.farg==="gul"?"bg-amber-500":"bg-green-500")} style={{width:f.utnyttjande+"%"}}></div></div><span className="text-xs">{f.utnyttjande}%</span></div></td><td className="font-medium">{f.v.regNr}</td><td>{f.dagar}</td><td>{f.resor}</td><td>{kr(f.km)} km</td><td><Badge color={f.farg}>{f.rek}</Badge></td></tr>))}</tbody></table></Card></div>}

    {tab==="skador"&&<div className="space-y-3"><SkadeKarta/><Card className="overflow-hidden"><table className="w-full text-sm"><thead><tr className="text-left text-gray-500 bg-gray-50 border-b"><th className="px-4 py-2">Allvar</th><th>Typ</th><th>Fordon</th><th>Förare</th><th>G-kraft</th><th>Tid</th><th>Plats</th><th>Status</th><th></th></tr></thead><tbody>{incidenter.map(it=>(<tr key={it.id} className="border-b last:border-0 hover:bg-gray-50"><td className="px-4 py-2"><Badge color={it.allvar==="hog"?"rod":"gul"}>{it.allvar==="hog"?"Hög":"Medel"}</Badge></td><td className="font-medium">{it.typ}</td><td>{it.fordonRegNr}</td><td>{it.forare}</td><td>{it.gkraft} G</td><td className="text-gray-500 whitespace-nowrap">{it.tid}</td><td className="text-gray-500">{it.adress.split(",")[0]}</td><td><Badge color={it.status==="Ny"?"rod":"gron"}>{it.status}</Badge></td><td><button onClick={()=>setClaim(it)} className="text-xs text-blue-700 hover:underline whitespace-nowrap">Förbered anmälan</button></td></tr>))}{incidenter.length===0&&<tr><td colSpan="9" className="p-8 text-center text-gray-400">Inga incidenter.</td></tr>}</tbody></table></Card></div>}
    {claim&&<ClaimModal it={claim} onClose={()=>setClaim(null)} onDone={(id)=>{ setIncidenter(xs=>xs.map(x=>x.id===id?{...x,status:"Anmälan förberedd"}:x)); setClaim(null); }}/>}
  </div>);
}
function AIInsightSummary({resor,avvik,uh,cs,fu}){
  const [txt,setTxt]=useState(""); const [busy,setBusy]=useState(false);
  const heur=()=>{ const hog=avvik.filter(a=>a.allvar==="hog").length; const akut=uh.filter(u=>u.risk==="hog"); const k=fu.filter(f=>f.farg==="rod").length;
    return "AI:n granskade "+resor.length+" resor: "+avvik.length+" avvikelser ("+hog+" allvarliga). Compliance ligger på "+cs.avg+"/100"+(cs.utanSyfte?" – "+cs.utanSyfte+" resor saknar syfte":"")+". "+(akut.length?akut.length+" fordon behöver service/besiktning snart. ":"")+(k?k+" fordon är kandidater för avveckling.":"Flottan utnyttjas väl."); };
  const run=async()=>{ setBusy(true); try{ if(AI.available()){ const ctx={antalResor:resor.length,compliance:cs,avvikelser:avvik.slice(0,12).map(a=>({typ:a.typ,allvar:a.allvar})),underhall:uh.filter(u=>u.risk!=="lag").map(u=>({reg:u.v.regNr,risk:u.risk,serviceOmDagar:u.dgrService})),lågtUtnyttjade:fu.filter(f=>f.farg!=="gron").map(f=>({reg:f.v.regNr,utnyttjande:f.utnyttjande}))};
    const a=await AI.chat([{role:"user",content:"Skriv först en kort inledande mening om läget. Lista sedan 2-3 prioriterade åtgärder, var och en på egen rad som börjar med '- '. Inga rubriker och inga markdown-symboler i löptexten."}],"Du är Milvys AI-analytiker. Svara på svenska, kort och prioriterat. Data:\n"+JSON.stringify(ctx),400); setTxt(a);} else setTxt(heur()); }catch(e){ setTxt(heur()); } setBusy(false); };
  useEffect(()=>{ run(); },[]);
  return (<Card className="p-4 border-[#C7D1FF] bg-gradient-to-r from-[#EEF1FF] to-white"><div className="flex items-center justify-between mb-2"><div className="flex items-center gap-2"><Spark className="w-4 h-4 text-[#2F4BFF]"/><span className="text-sm font-semibold text-[#2F4BFF]">AI-analys & rekommendationer</span></div><button onClick={run} disabled={busy} className="text-xs text-[#2F4BFF] hover:underline disabled:opacity-50">↻ Uppdatera</button></div>{busy?<span className="ai-typing"><span></span><span></span><span></span></span>:<div className="text-sm text-gray-700 leading-relaxed space-y-0.5" dangerouslySetInnerHTML={{__html:mdLite(txt)}}/>}</Card>);
}
function ClaimModal({it,onClose,onDone}){
  const [txt,setTxt]=useState(""); const [busy,setBusy]=useState(false);
  const bas="SKADEANMÄLAN (förberedd av Milvy AI)\n\nFordon: "+it.fordonRegNr+"\nFörare: "+it.forare+"\nHändelse: "+it.typ+"\nTidpunkt: "+it.tid+"\nPlats: "+it.adress+"\nUppmätt G-kraft: "+it.gkraft+" G\nAllvarlighetsgrad: "+(it.allvar==="hog"?"Hög":"Medel")+"\n\nBeskrivning: Telematikenheten registrerade en "+it.typ.toLowerCase()+" med "+it.gkraft+" G vid angiven tidpunkt och plats. Föraren bör kontaktas för bekräftelse av eventuell skada.";
  useEffect(()=>{ (async()=>{ if(AI.available()){ setBusy(true); try{ const a=await AI.chat([{role:"user",content:"Skriv en kort, professionell skadeanmälan-text på svenska för försäkringsbolag baserat på: "+JSON.stringify(it)}],"Du skriver försäkringsskadeanmälningar. Saklig svenska.",300); setTxt(bas+"\n\nAI-formulerad sammanfattning:\n"+a);}catch(e){ setTxt(bas);} setBusy(false);} else setTxt(bas); })(); },[]);
  return (<div className="fixed inset-0 bg-black/40 flex items-center justify-center z-[3000] p-4" onClick={onClose}><Card className="p-6 w-[600px] max-w-full max-h-[90vh] overflow-auto" onClick={e=>e.stopPropagation()}>
    <div className="flex items-center justify-between mb-3"><h2 className="font-bold text-lg">Skadeanmälan – {it.fordonRegNr}</h2><button onClick={onClose} className="text-gray-400 text-xl">✕</button></div>
    {busy?<div className="ai-typing py-6"><span></span><span></span><span></span></div>:<textarea value={txt} onChange={e=>setTxt(e.target.value)} rows="14" className="w-full px-3 py-2 border rounded-lg text-sm font-mono"/>}
    <div className="flex gap-2 justify-end mt-3"><button onClick={()=>navigator.clipboard&&navigator.clipboard.writeText(txt)} className="px-3 py-2 text-sm rounded-lg border">Kopiera</button><button onClick={()=>onDone(it.id)} className="px-4 py-2 text-sm rounded-lg text-white" style={{background:"#16a34a"}}>Markera som förberedd</button></div>
  </Card></div>);
}

/* ============================ ZONER (geofence) ============================ */
function Zoner({zoner,setZoner}){
  const mapRef=useRef(); const map=useRef(); const drawn=useRef([]);
  const [namn,setNamn]=useState(""); const [regel,setRegel]=useState("stanna_inne");
  const [valda,setValda]=useState([]); const [ritar,setRitar]=useState(false); const [punkter,setPunkter]=useState([]); const [sok,setSok]=useState("");
  const [tFran,setTFran]=useState(""); const [tTill,setTTill]=useState(""); const [dagar,setDagar]=useState([1,2,3,4,5]);
  const [zontyp,setZontyp]=useState("Arbetsområde"); const [autoSyfte,setAutoSyfte]=useState(""); const [autoResetyp,setAutoResetyp]=useState(""); const [mottagare,setMottagare]=useState("");
  const toggleDag=(d)=>setDagar(ds=>ds.includes(d)?ds.filter(x=>x!==d):[...ds,d]);
  useEffect(()=>{ map.current=L.map(mapRef.current).setView([59.61,16.55],10); L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"© OpenStreetMap",maxZoom:19}).addTo(map.current);
    const inv=()=>{ if(map.current){ map.current.invalidateSize(); map.current.setView([59.61,16.55],10); } };
    const t1=setTimeout(inv,250), t2=setTimeout(inv,800); window.addEventListener("resize",inv);
    return ()=>{ clearTimeout(t1); clearTimeout(t2); window.removeEventListener("resize",inv); map.current.remove(); }; },[]);
  // klick lägger till hörn när man ritar
  useEffect(()=>{ if(!map.current||!ritar)return; const h=e=>setPunkter(ps=>[...ps,{lat:e.latlng.lat,lng:e.latlng.lng}]); map.current.on("click",h); map.current.getContainer().style.cursor="crosshair"; return ()=>{ map.current.off("click",h); if(map.current)map.current.getContainer().style.cursor=""; }; },[ritar]);
  // rita om allt
  useEffect(()=>{ if(!map.current)return; drawn.current.forEach(l=>map.current.removeLayer(l)); drawn.current=[];
    // sparade zonformer
    zoner.forEach(z=>{ const b=zonBrott(z); const col=b.length?"#dc2626":"#0E1726"; let shape;
      if(z.points&&z.points.length>=3) shape=L.polygon(z.points,{color:col,fillColor:col,fillOpacity:0.10});
      else shape=L.circle([z.lat,z.lng],{radius:(z.radieKm||1)*1000,color:col,fillColor:col,fillOpacity:0.08});
      shape.addTo(map.current).bindTooltip(z.namn); drawn.current.push(shape); });
    // ALLA fordon/maskiner som referens (grå; röd vid överträdelse) – så man ser var man ritar
    ALLAOBJEKT.forEach(o=>{ const p=objektPos(o); if(!p)return; const ute=zoner.some(z=>(z.objektIds||[]).includes(o.id)&&zonBrott(z).includes(o.id));
      const mk=L.circleMarker([p.lat,p.lng],{radius:5,color:ute?"#dc2626":"#475569",fillColor:ute?"#dc2626":"#94a3b8",fillOpacity:0.95,weight:2}).addTo(map.current).bindTooltip(o.namn+" ("+o.typ+")"); drawn.current.push(mk); });
    // pågående ritning – tydliga hörn + linje
    if(punkter.length){ const ll=punkter.map(p=>[p.lat,p.lng]);
      const line=(punkter.length>=3?L.polygon(ll,{color:"#2F4BFF",weight:3,dashArray:"6 6",fillColor:"#2F4BFF",fillOpacity:0.12}):L.polyline(ll,{color:"#2F4BFF",weight:3,dashArray:"6 6"})).addTo(map.current); drawn.current.push(line);
      punkter.forEach((p,i)=>{ const v=L.circleMarker([p.lat,p.lng],{radius:6,color:"#2F4BFF",fillColor:"#fff",fillOpacity:1,weight:3}).addTo(map.current).bindTooltip("Hörn "+(i+1),{permanent:false}); drawn.current.push(v); }); }
  },[zoner,punkter,ritar]);
  const toggle=(id)=>setValda(v=>v.includes(id)?v.filter(x=>x!==id):[...v,id]);
  const ångra=()=>setPunkter(ps=>ps.slice(0,-1));
  const rensa=()=>{ setPunkter([]); };
  const spara=()=>{ if(punkter.length<3)return; const n=namn.trim()||("Zon "+(zoner.length+1)); setZoner(zs=>[...zs,{id:"z"+Date.now(),namn:n,zontyp,points:punkter.map(p=>[p.lat,p.lng]),regel,objektIds:valda,aktivFran:tFran||null,aktivTill:tTill||null,dagar:[...dagar],autoSyfte,autoResetyp,mottagare}]); setNamn(""); setValda([]); setPunkter([]); setRitar(false); setAutoSyfte(""); setMottagare(""); };
  const taBort=async(id)=>{ if(await askConfirm("Ta bort zonen? Det går inte att ångra.",true)) setZoner(zs=>zs.filter(z=>z.id!==id)); };
  const geokoda=async()=>{ if(!sok.trim())return; try{ const r=await fetch("https://nominatim.openstreetmap.org/search?format=json&limit=1&q="+encodeURIComponent(sok)); const j=await r.json(); if(j&&j[0]) map.current.setView([+j[0].lat,+j[0].lon],14); }catch(e){} };
  const minPlats=()=>{ navigator.geolocation&&navigator.geolocation.getCurrentPosition(pos=>map.current.setView([pos.coords.latitude,pos.coords.longitude],14)); };
  const visaAlla=()=>{ const pts=ALLAOBJEKT.map(objektPos).filter(Boolean).map(p=>[p.lat,p.lng]); if(pts.length) map.current.fitBounds(pts,{padding:[40,40]}); };

function Boka({bokRegler}){
  const R=bokRegler||{maxDagar:7,slot:60,oppnaFran:"06:00",oppnaTill:"20:00",maxFramAt:90};
  const [list,setList]=useState(()=>DB.load("bokningar",BOKNINGAR_INIT.map(b=>({...b,dagFran:b.dag,dagTill:b.dag}))));
  useEffect(()=>DB.save("bokningar",list),[list]);
  const i0=fmtDatum(idag);
  const [dagFran,setDagFran]=useState(i0),[dagTill,setDagTill]=useState(i0),[fran,setFran]=useState("08:00"),[till,setTill]=useState("12:00"),[namn,setNamn]=useState(""),[syfte,setSyfte]=useState(""),[okBokad,setOkBokad]=useState("");
  const bStart=(b)=>(b.dagFran||b.dag)+"T"+b.fran, bEnd=(b)=>(b.dagTill||b.dag)+"T"+b.till;
  const reqStart=dagFran+"T"+fran, reqEnd=dagTill+"T"+till;

  const giltig=fel.length===0;
  const overlapp=(b)=> !(reqEnd<=bStart(b) || reqStart>=bEnd(b));

  const boka=(reg)=>{ if(!namn.trim()||!giltig)return; setList(l=>[{id:"bk"+Date.now(),fordonRegNr:reg,anvandare:namn,dagFran,dagTill,fran,till,syfte},...l]); setOkBokad(reg+" bokad "+(dagFran===dagTill?dagFran:dagFran+"–"+dagTill)+" "+fran+"–"+till); setTimeout(()=>setOkBokad(""),2800); };

function PositionsHistorik({resor}){
  const ref=useRef(),map=useRef(),layers=useRef([]);
  const [reg,setReg]=useState(FORDON[0].regNr),[dag,setDag]=useState(fmtDatum(new Date(idag.getTime()-86400000)));
  const visa=()=>{ if(!map.current)return; layers.current.forEach(l=>map.current.removeLayer(l)); layers.current=[];
    const v=FORDON.find(x=>x.regNr===reg); const trips=resor.filter(r=>r.fordonId===(v&&v.id)&&fmtDatum(r.startTid)===dag).sort((a,b)=>a.startTid-b.startTid); const pts=[];
    trips.forEach(r=>{ const a=[r.startLat,r.startLng],b=[r.stoppLat,r.stoppLng]; layers.current.push(L.polyline([a,b],{color:"#2F4BFF",weight:4,opacity:.7}).addTo(map.current)); layers.current.push(L.circleMarker(a,{radius:4,color:"#16a34a",fillColor:"#16a34a",fillOpacity:1}).addTo(map.current).bindPopup("Start "+fmtTid(r.startTid))); layers.current.push(L.circleMarker(b,{radius:4,color:"#dc2626",fillColor:"#dc2626",fillOpacity:1}).addTo(map.current).bindPopup("Stopp "+fmtTid(r.stoppTid))); pts.push(a,b); });
    if(pts.length) map.current.fitBounds(pts,{padding:[40,40]}); };
  useEffect(()=>{ map.current=L.map(ref.current).setView([59.61,16.55],11); L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"© OpenStreetMap"}).addTo(map.current); const t=setTimeout(()=>{ if(map.current){map.current.invalidateSize(); visa();} },300); return ()=>{clearTimeout(t); map.current.remove();}; },[]);
  const inp="px-3 py-2 border rounded-lg text-sm";
  return (<div className="space-y-3"><div className="flex gap-2 flex-wrap items-end"><div><div className={lblmono+" mb-1"}>Fordon</div><select value={reg} onChange={e=>setReg(e.target.value)} className={inp}>{FORDON.map(v=>(<option key={v.id} value={v.regNr}>{v.regNr}</option>))}</select></div><div><div className={lblmono+" mb-1"}>Datum</div><input type="date" value={dag} onChange={e=>setDag(e.target.value)} className={inp}/></div><button onClick={visa} className="px-4 py-2 rounded-lg text-white text-sm font-medium" style={{background:"#0E1726"}}>Visa rutt</button></div>
    <Card className="overflow-hidden h-[460px]"><div ref={ref} className="w-full h-full"></div></Card></div>);
}

function tsSasong(d){ const m=d.getMonth(),day=d.getDate(); const var2=(m>2&&m<5)||(m===2)||(m===5&&day<=18); const host=(m===7&&day>=15)||(m===8)||(m===9)||(m===10); return var2||host; }
function tsTaxa(d){ const wd=d.getDay(); if(wd===0||wd===6) return {kr:0}; if(d.getMonth()===6) return {kr:0}; const t=d.getHours()*60+d.getMinutes(); if(t<360||t>1109) return {kr:0}; let kr; if(t<390)kr=15;else if(t<420)kr=27;else if(t<510)kr=45;else if(t<540)kr=27;else if(t<900)kr=22;else if(t<930)kr=27;else if(t<1020)kr=45;else if(t<1050)kr=27;else kr=22; if(!tsSasong(d)) kr=Math.round(kr*0.78); return {kr}; }
function tsInStockholm(la,ln){ return la>59.30&&la<59.37&&ln>17.9&&ln<18.25; }
function trangselBerakning(resor){
  const pass=[];
  resor.forEach(r=>{ [["s",r.startLat,r.startLng,r.startTid],["e",r.stoppLat,r.stoppLng,r.stoppTid]].forEach(([typ,la,ln,tid])=>{ if(tsInStockholm(la,ln)){ const tx=tsTaxa(tid); if(tx.kr>0) pass.push({id:r.id+typ,fordon:r.fordonRegNr,forare:r.forareNamn,resetyp:r.resetyp,datum:fmtDatum(tid),tid:fmtTid(tid),tidObj:tid,belopp:tx.kr,hog:tsSasong(tid)}); } }); });
  const byKey={}; pass.forEach(p=>{ const k=p.fordon+"|"+p.datum; (byKey[k]=byKey[k]||[]).push(p); });
  Object.values(byKey).forEach(arr=>{ const cap=arr[0].hog?135:105; arr.sort((a,b)=>a.tidObj-b.tidObj); let sum=0; arr.forEach(p=>{ const rem=cap-sum; p.debiterat=Math.max(0,Math.min(p.belopp,rem)); sum+=p.debiterat; }); });
  pass.sort((a,b)=>b.tidObj-a.tidObj);
  const total=pass.reduce((s,p)=>s+(p.debiterat||0),0); const tjanst=pass.filter(p=>p.resetyp==="Tjänsteresa").reduce((s,p)=>s+(p.debiterat||0),0);
  const perF={}; pass.forEach(p=>{ perF[p.fordon]=perF[p.fordon]||{antal:0,summa:0}; perF[p.fordon].antal++; perF[p.fordon].summa+=p.debiterat||0; });
  return {pass, antal:pass.length, total:Math.round(total), tjanst:Math.round(tjanst), privat:Math.round(total-tjanst), perFordon:Object.entries(perF).map(([reg,x])=>({reg,...x})).sort((a,b)=>b.summa-a.summa)};
}

function AllaLarm({resor,zoner}){
  const [filt,setFilt]=useState("alla");
  const ev=[];
  detekteraAvvikelser(resor).forEach(a=>ev.push({kat:"Avvikelse",typ:a.typ,allvar:a.allvar,text:a.text,reg:a.r.fordonRegNr,tid:a.r.startTid}));
  ENHETSHANDELSER.forEach(e=>ev.push({kat:"Enhet",typ:e.typ,allvar:e.allvar,text:e.typ+" ("+e.enhetId+")",reg:e.reg,tid:new Date(e.tid.replace(" ","T"))}));
  (zoner||[]).forEach(z=>zonBrott(z).forEach(oid=>{const o=ALLAOBJEKT.find(x=>x.id===oid); ev.push({kat:"Zon",typ:"Zonöverträdelse",allvar:"hog",text:(o&&o.namn)+" "+(z.regel==="ej_in"?"inne i":"utanför")+" "+z.namn,reg:o&&o.namn,tid:idag});}));
  TEMPSENSORER.filter(t=>t.status==="larm").forEach(t=>ev.push({kat:"Sensor",typ:"Temperaturlarm",allvar:"hog",text:t.namn+" "+t.temp+"°C utanför intervall",reg:t.fordonRegNr,tid:idag}));
  ROERELSELARM.forEach(r=>ev.push({kat:"Tillgång",typ:"Stöldlarm",allvar:r.allvar,text:r.text+" – "+r.objekt,reg:r.objekt,tid:new Date(r.tid.replace(" ","T"))}));
  const kats=["alla","Avvikelse","Enhet","Zon","Sensor","Tillgång"];
  const list=ev.filter(e=>filt==="alla"||e.kat===filt).sort((a,b)=>b.tid-a.tid);

/* ---- Förar-klassning: ruttminne, AI-förslag, vy-väljare ---- */
function ruttKey(r){ return r.startAdress.split(",")[0]+" → "+r.stoppAdress.split(",")[0]; }
const RUTTMINNE={ load(){ try{return JSON.parse(localStorage.getItem("msp_ruttminne"))||{};}catch(e){return {};} }, save(m){ try{localStorage.setItem("msp_ruttminne",JSON.stringify(m));}catch(e){} } };
let MILVY_PLATSER={};
function klassForslag(r,minne){
  const key=ruttKey(r);
  if(minne&&minne[key]) return {typ:minne[key],konf:0.97,kand:true};
  const sl=MILVY_PLATSER[r.stoppAdress.split(",")[0]], st=MILVY_PLATSER[r.startAdress.split(",")[0]];
  if((sl&&/hem|bostad/i.test(sl))||(st&&/hem|bostad/i.test(st))) return {typ:"Privatresa",konf:0.9,kand:false,plats:true};
  if(sl&&/kund|möte|kontor|jobb|verkstad/i.test(sl)) return {typ:"Tjänsteresa",konf:0.92,kand:false,plats:true};
  const h=r.startTid.getHours(), d=r.startTid.getDay(), adr=(r.startAdress+" "+r.stoppAdress).toLowerCase();
  let typ="Tjänsteresa", konf=0.66;
  if(/sigurdsgatan|kontor|kund|kista|platinav|föreningsgatan|stentorps|jakobsgatan/.test(adr)){ typ="Tjänsteresa"; konf=0.9; }
  if(/hem|bostad|villa/.test(adr)){ typ="Privatresa"; konf=0.86; }
  if(d===0||d===6){ typ="Privatresa"; konf=0.82; }
  else if(h<6||h>=19){ typ="Privatresa"; konf=0.73; }
  return {typ,konf,kand:false};
}

  const S={resor,setResor,kvitton,setKvitton,laddning,setLaddning,incidenter,setIncidenter,zoner,setZoner,bokRegler,setBokRegler,openSettings,setRoute,route};
  const hubKey=route.name+"|"+(route.sub||"")+"|"+(route.vid||"");
  return (<div className="min-h-screen md:flex" key={cfgVer}>
    <Header route={route} setRoute={setRoute} openSettings={openSettings} navOpen={navOpen} setNavOpen={setNavOpen} roll={roll} setRoll={(r)=>{setRoll(r); setRoute(r==="forare"?{name:"forare_resor"}:{name:"oversikt"}); setNavOpen(false);}}/>
    {navOpen&&<div className="fixed inset-0 bg-black/40 z-[1150] md:hidden" onClick={()=>setNavOpen(false)}></div>}
    <div className="flex-1 min-w-0 flex flex-col">
    <div className="md:hidden sticky top-0 z-[1100] flex items-center gap-3 h-12 px-4 text-white" style={{background:"#0E1726"}}>
      <button onClick={()=>setNavOpen(true)} className="p-1"><svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeWidth="2" d="M4 6h16M4 12h16M4 18h16"/></svg></button>
      <span className="font-display font-bold">Milvy</span></div>
    <main className="max-w-[1180px] w-full mx-auto px-4 sm:px-6 py-6 pb-24">
      {roll!=="forare"&&<div className="mb-4 flex items-center justify-between gap-3 rounded-xl px-3 py-2 text-sm" style={{background:dbAdmin?"#ECFDF5":"#EEF1FF"}}>
        <span className={dbAdmin?"text-green-800":"text-[#22356B]"}>{dbAdmin?"🟢 Ansluten till databasen – visar riktiga resor från Supabase":"Visar demodata (mock). Anslut databasen för riktiga resor."}</span>
        {dbAdmin?<button onClick={dbKopplaUt} className="text-[#2F4BFF] font-medium shrink-0">Koppla från</button>:<button onClick={()=>setDbConnect(true)} className="px-3 py-1 rounded-lg text-white font-medium shrink-0" style={{background:"#0E1726"}}>Anslut databas</button>}</div>}
      {roll==="forare" ? <ForarVy driver={forareJag} resor={resor} setResor={setResor}/> : <React.Fragment>
      {route.name==="oversikt"&&<Dashboard resor={resor} kvitton={kvitton} incidenter={incidenter} zoner={zoner} setRoute={setRoute} openOnboarding={()=>setOnboard(true)}/>}
      {route.name==="karta"&&<KartaHub key={hubKey} S={S}/>}
      {route.name==="journal"&&<KorjournalHub key={hubKey} S={S}/>}
      {route.name==="flotta"&&<FlottaHub key={hubKey} S={S}/>}
      {route.name==="larm"&&<LarmHub key={hubKey} S={S}/>}
      {route.name==="ekonomi"&&<EkonomiHub key={hubKey} S={S}/>}
      {route.name==="analys"&&<AIInsikter key={hubKey} resor={resor} setResor={setResor} route={route} incidenter={incidenter} setIncidenter={setIncidenter} openSettings={openSettings}/>}
      {route.name==="admin"&&<AdminModul bokRegler={bokRegler} setBokRegler={setBokRegler} openSettings={openSettings}/>}
      </React.Fragment>}
    </main>
    <footer className="text-center text-[11px] font-mono text-[#8A93A0] py-6">Milvy · MVP med mockdata · {ORG.namn}</footer>
    </div>
    <AIAssistant resor={resor} setResor={setResor} open={aiOpen} setOpen={setAiOpen} openSettings={openSettings}/>
    {settings&&<AISettings onClose={closeSettings}/>}
    {dbConnect&&<DbConnectModal onClose={()=>setDbConnect(false)} onConnected={dbKoppla}/>}
    <ConfirmHost/>
    {onboard&&<OnboardingChecklist setRoute={setRoute} onClose={()=>{localStorage.setItem("milspar_onb_seen","1"); setOnboard(false);}}/>}
  </div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
